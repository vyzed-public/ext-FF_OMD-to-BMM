<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 10px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #7B68C4;
      margin-bottom: 10px;
    }
    .folder {
      margin-left: 12px;
    }
    .folder-label {
      font-weight: 500;
      color: #333;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      display: inline-block;
      margin: 1px 0;
    }
    .folder-label:hover {
      background: #f0edf7;
    }
    .folder-label.target {
      background: #ede8f7;
      color: #7B68C4;
      font-weight: 600;
    }
    .bookmark {
      margin-left: 12px;
      padding: 1px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bookmark a {
      color: #555;
      text-decoration: none;
      font-size: 12px;
    }
    .bookmark a:hover {
      color: #7B68C4;
      text-decoration: underline;
    }
    .bookmark.new-item a {
      color: #2a7d4f;
      font-weight: 500;
    }
    .toggle {
      display: inline-block;
      width: 14px;
      font-size: 11px;
      color: #999;
      cursor: pointer;
      text-align: center;
      user-select: none;
    }
    .collapsed > .children {
      display: none;
    }
    .collapsed > .folder-header > .toggle::after {
      content: "▸";
    }
    .expanded > .folder-header > .toggle::after {
      content: "▾";
    }
    .children {
      margin-left: 4px;
    }
    .info {
      font-size: 12px;
      color: #999;
      margin-bottom: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>OMD-to-BMM Bookmarks</h1>
  <div id="info" class="info">Loading...</div>
  <div id="tree"></div>
  <script src="sidebar.js"></script>
</body>
</html>
